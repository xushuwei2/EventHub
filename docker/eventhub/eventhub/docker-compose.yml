services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eventhub
      MYSQL_USER: eventhub
      MYSQL_PASSWORD: eventhub
    ports:
      - "3307:3306"
    volumes:
      - eventhub_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  eventhub:
    build:
      context: ../..
      dockerfile: docker/eventhub/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: eventhub
      DB_PASSWORD: eventhub
      DB_NAME: eventhub
      HTTP_ADDR: ":8080"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-dev-session-secret-change-in-production}
      DEMO_PROJECT_SECRET: demo-secret
    volumes:
      - ./data/log:/app/log
      - ./config:/app/config
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  eventhub_mysql:
