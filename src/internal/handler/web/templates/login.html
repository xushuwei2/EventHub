<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventHub 登录</title>
  <link rel="stylesheet" href="/reporting/admin/static/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <h1>EventHub</h1>
    <p class="subtitle">前端错误采集后台</p>
    {{if .Error}}<div class="alert">{{.Error}}</div>{{end}}
    <form method="post" action="/reporting/admin/login">
      <label>用户名</label>
      <input type="text" name="username" required autofocus>
      <label>密码</label>
      <input type="password" name="password" required>
      <button type="submit">登录</button>
    </form>
  </div>
</body>
</html>
