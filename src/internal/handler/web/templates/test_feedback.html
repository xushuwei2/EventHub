<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>反馈提交测试 - EventHub</title>
  <link rel="stylesheet" href="/reporting/admin/static/style.css">
</head>
<body>
  {{template "nav" .}}
  <main class="container">
    <h1>反馈提交测试</h1>
    {{template "test_tabs" .}}
    <p class="hint">模拟 App 内「意见反馈」提交。成功后可在 <a href="/reporting/admin/feedback">用户反馈</a> 查看。</p>

    <div class="grid-2">
      {{template "test_identity" .}}

      <div class="card form-card form-card-wide">
        <h2>反馈内容</h2>
        <label>category</label>
        <select id="feedback-category">
          <option value="bug" selected>bug</option>
          <option value="suggestion">suggestion</option>
          <option value="question">question</option>
          <option value="other">other</option>
        </select>

        <label>content <span class="label-hint">（必填）</span></label>
        <textarea id="feedback-content" rows="4" placeholder="请描述您遇到的问题…">测试：点击支付按钮后没有任何反应，试了好几次都一样。</textarea>

        <label>contact <span class="label-hint">（可空）</span></label>
        <input type="text" id="feedback-contact" placeholder="user@example.com">

        <label>route / scene <span class="label-hint">（可空）</span></label>
        <div class="inline-fields">
          <input type="text" id="feedback-route" value="settings" placeholder="settings">
          <input type="text" id="feedback-scene" value="feedback_form" placeholder="feedback_form">
        </div>

        <label>extra.screenshotUrl <span class="label-hint">（可空）</span></label>
        <input type="text" id="feedback-screenshot" placeholder="https://cdn.example.com/shot.png">

        <button type="button" class="btn-primary" id="btn-send-feedback">提交用户反馈</button>
      </div>
    </div>

    {{template "test_response" .}}
  </main>
  <script src="/reporting/admin/static/test-common.js"></script>
  <script src="/reporting/admin/static/test-feedback.js"></script>
</body>
</html>
