<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行为打点测试 - EventHub</title>
  <link rel="stylesheet" href="/reporting/admin/static/style.css">
</head>
<body>
  {{template "nav" .}}
  <main class="container">
    <h1>行为打点测试</h1>
    {{template "test_tabs" .}}
    <p class="hint">模拟客户端行为事件上报。成功后可在 <a href="/reporting/admin/analytics">活跃概览</a> 查看。</p>

    <div class="grid-2">
      {{template "test_identity" .}}

      <div class="card form-card form-card-wide">
        <h2>打点内容</h2>
        <label>eventName</label>
        <input type="text" id="track-event-name" value="page_view">

        <label>route <span class="label-hint">（可空）</span></label>
        <input type="text" id="route" placeholder="home">

        <label>funnelKey / stepKey <span class="label-hint">（可空，须成对）</span></label>
        <div class="inline-fields">
          <input type="text" id="track-funnel-key" placeholder="register_flow">
          <input type="text" id="track-step-key" placeholder="home_view">
        </div>

        <button type="button" class="btn-primary" id="btn-send-track">发送行为打点</button>
      </div>
    </div>

    {{template "test_response" .}}
  </main>
  <script src="/reporting/admin/static/test-common.js"></script>
  <script src="/reporting/admin/static/test-track.js"></script>
</body>
</html>
