<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改密码 - EventHub</title>
  <link rel="stylesheet" href="/reporting/admin/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">EventHub</div>
    <nav>
      <a href="/reporting/admin/issues">问题列表</a>
      <a href="/reporting/admin/projects">项目配置</a>
      <a href="/reporting/admin/test">接入测试</a>
      <a href="/reporting/admin/password">修改密码</a>
      <a href="/reporting/admin/logout">退出</a>
    </nav>
  </header>
  <main class="container">
    <h1>修改密码</h1>
    <div class="card form-card">
      {{if .Error}}<div class="alert">{{.Error}}</div>{{end}}
      {{if .Success}}<div class="alert success">{{.Success}}</div>{{end}}
      <form method="post" action="/reporting/admin/password">
        <label>当前密码</label>
        <input type="password" name="current_password" required autocomplete="current-password">
        <label>新密码</label>
        <input type="password" name="new_password" required minlength="8" autocomplete="new-password">
        <label>确认新密码</label>
        <input type="password" name="confirm_password" required minlength="8" autocomplete="new-password">
        <button type="submit">保存</button>
      </form>
    </div>
  </main>
</body>
</html>
