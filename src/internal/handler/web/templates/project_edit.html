<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑项目 - EventHub</title>
  <link rel="stylesheet" href="/reporting/admin/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">EventHub</div>
    <nav>
      <a href="/reporting/admin/issues">问题列表</a>
      <a href="/reporting/admin/projects">项目配置</a>
      <a href="/reporting/admin/test">接入测试</a>
      <a href="/reporting/admin/password">修改密码</a>
      <a href="/reporting/admin/logout">退出</a>
    </nav>
  </header>
  <main class="container">
    <p><a href="/reporting/admin/projects">&larr; 返回项目列表</a></p>
    <h1>编辑项目</h1>

    {{if .Error}}<div class="alert">{{.Error}}</div>{{end}}

    <div class="card form-card form-card-wide">
      <form method="post" action="/reporting/admin/projects/{{.Project.ID}}">
        <label>项目 Key</label>
        <input type="text" value="{{.Project.ProjectKey}}" disabled>
        <p class="hint">项目 Key 创建后不可修改，通过 <code>reportToken</code> 中的 <code>project_key</code> 标识项目。</p>

        <label>Token 密钥</label>
        <div class="secret-input-group">
          <input type="text" id="edit-token-secret" name="trusted_token_secret" required minlength="8" maxlength="256" value="{{.Project.TrustedTokenSecret}}">
          <button type="button" class="btn-secondary" data-random-secret="edit-token-secret">随机</button>
          <button type="button" class="btn-secondary" data-copy-from="edit-token-secret">复制</button>
        </div>
        <p class="hint">修改后需同步更新业务后端的 <code>trustedTokenSecret</code> 配置。</p>

        <label>状态</label>
        <select name="status">
          <option value="active" {{if eq .Project.Status "active"}}selected{{end}}>active</option>
          <option value="disabled" {{if eq .Project.Status "disabled"}}selected{{end}}>disabled</option>
        </select>

        <button type="submit" class="btn-primary">保存</button>
      </form>
    </div>
  </main>
  <script src="/reporting/admin/static/admin.js"></script>
</body>
</html>
